<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .hdr { fill: #161b22; }
      .col { font-family: 'Courier New', monospace; font-size: 12px; }
      .lbl { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 10px; }
      .hl  { fill: #58a6ff; font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; }

      .c1 { animation: f1 2.1s linear infinite; }
      .c2 { animation: f2 2.8s linear infinite; animation-delay: 0.4s; }
      .c3 { animation: f3 3.5s linear infinite; animation-delay: 0.9s; }
      .c4 { animation: f4 2.3s linear infinite; animation-delay: 1.3s; }
      .c5 { animation: f5 3.1s linear infinite; animation-delay: 0.2s; }
      .c6 { animation: f6 2.6s linear infinite; animation-delay: 1.7s; }
      .c7 { animation: f7 2.9s linear infinite; animation-delay: 0.6s; }
      .c8 { animation: f8 3.3s linear infinite; animation-delay: 1.1s; }

      @keyframes f1 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.8} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f2 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.8} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f3 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.8} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f4 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.7} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f5 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.9} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f6 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.6} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f7 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.8} 100%{transform:translateY(200px);opacity:0} }
      @keyframes f8 { 0%{transform:translateY(-180px);opacity:0} 10%{opacity:1} 85%{opacity:.5} 100%{transform:translateY(200px);opacity:0} }

      .crs { animation: blink 1s step-end infinite; fill: #58a6ff; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .t1 { animation: ta 9s linear infinite; }
      .t2 { animation: tb 9s linear infinite; animation-delay: 3s; }
      .t3 { animation: tc 9s linear infinite; animation-delay: 6s; }
      @keyframes ta { 0%,8%{opacity:0} 12%,38%{opacity:1} 42%,100%{opacity:0} }
      @keyframes tb { 0%,8%{opacity:0} 12%,38%{opacity:1} 42%,100%{opacity:0} }
      @keyframes tc { 0%,8%{opacity:0} 12%,38%{opacity:1} 42%,100%{opacity:0} }

      .b1 { animation: bg1 3.5s ease-out infinite; transform-origin: 312px 128px; }
      .b2 { animation: bg2 3.5s ease-out infinite; transform-origin: 312px 142px; animation-delay:.35s; }
      .b3 { animation: bg3 3.5s ease-out infinite; transform-origin: 312px 156px; animation-delay:.7s; }
      .b4 { animation: bg4 3.5s ease-out infinite; transform-origin: 312px 170px; animation-delay:1.05s; }
      @keyframes bg1 { 0%,100%{transform:scaleX(0)} 30%,80%{transform:scaleX(1)} }
      @keyframes bg2 { 0%,100%{transform:scaleX(0)} 30%,80%{transform:scaleX(1)} }
      @keyframes bg3 { 0%,100%{transform:scaleX(0)} 30%,80%{transform:scaleX(1)} }
      @keyframes bg4 { 0%,100%{transform:scaleX(0)} 30%,80%{transform:scaleX(1)} }
    </style>
    <clipPath id="rc">
      <rect x="0" y="30" width="258" height="170"/>
    </clipPath>
  </defs>

  <!-- Card -->
  <rect width="480" height="200" rx="8" class="bg"/>
  <rect width="480" height="200" rx="8" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Header -->
  <rect width="480" height="28" rx="8" class="hdr"/>
  <rect y="14" width="480" height="14" class="hdr"/>
  <circle cx="16" cy="14" r="5" fill="#f78166"/>
  <circle cx="32" cy="14" r="5" fill="#e3b341"/>
  <circle cx="48" cy="14" r="5" fill="#3fb950"/>
  <text x="240" y="19" text-anchor="middle" class="hl">ritesh@dev: ~/portfolio</text>

  <!-- Vertical divider -->
  <line x1="260" y1="30" x2="260" y2="200" stroke="#30363d" stroke-width=".5"/>

  <!-- LEFT: Code Rain -->
  <g clip-path="url(#rc)">
    <g class="c1 col" fill="#79c0ff" transform="translate(18,40)">
      <text y="0">def</text><text y="16">for</text><text y="32">in:</text>
      <text y="48">if</text><text y="64">&#955;</text><text y="80">&#8594;</text>
    </g>
    <g class="c2 col" fill="#7ee787" transform="translate(48,30)">
      <text y="0">0.73</text><text y="16">True</text><text y="32">[0]</text>
      <text y="48">+=</text><text y="64">&#960;</text><text y="80">&#8734;</text>
    </g>
    <g class="c3 col" fill="#d2a8ff" transform="translate(84,50)">
      <text y="0">fit(</text><text y="16">R&#178;</text><text y="32">w&#183;x</text>
      <text y="48">&#8706;L</text><text y="64">&#963;</text><text y="80">&#956;</text>
    </g>
    <g class="c4 col" fill="#ffa657" transform="translate(122,35)">
      <text y="0">git</text><text y="16">push</text><text y="32">pip</text>
      <text y="48">run</text><text y="64">{}</text><text y="80">[]</text>
    </g>
    <g class="c5 col" fill="#56d364" transform="translate(162,45)">
      <text y="0">NaN</text><text y="16">df</text><text y="32">.T</text>
      <text y="48">&#8594;</text><text y="64">&#9654;</text><text y="80">&#10003;</text>
    </g>
    <g class="c6 col" fill="#58a6ff" transform="translate(196,38)">
      <text y="0">&#9881;</text><text y="16">&#9650;</text><text y="32">&#9632;</text>
      <text y="48">&#9679;</text><text y="64">&#9670;</text><text y="80">&#10022;</text>
    </g>
    <g class="c7 col" fill="#f78166" transform="translate(218,42)">
      <text y="0">err</text><text y="16">-1</text><text y="32">fix</text>
      <text y="48">0</text><text y="64">!</text>
    </g>
    <g class="c8 col" fill="#3d444d" transform="translate(242,36)">
      <text y="0">#</text><text y="16">/*</text><text y="32">*/</text>
      <text y="48">--</text><text y="64">~~</text>
    </g>
  </g>

  <!-- RIGHT: Terminal -->
  <text x="272" y="50" class="lbl">$ python train.py --model ridge</text>
  <g class="t1">
    <text x="272" y="65" font-family="Courier New,monospace" font-size="10" fill="#7ee787">&#10003;  R&#178; score: 0.7341</text>
    <text x="272" y="78" font-family="Courier New,monospace" font-size="10" fill="#7ee787">&#10003;  RMSE reduced 10%</text>
    <text x="272" y="91" font-family="Courier New,monospace" font-size="10" fill="#58a6ff">&#8594;  Deployed on Streamlit</text>
  </g>
  <g class="t2">
    <text x="272" y="65" font-family="Courier New,monospace" font-size="10" fill="#e3b341">&#9889;  15+ hackathons</text>
    <text x="272" y="78" font-family="Courier New,monospace" font-size="10" fill="#7ee787">&#10003;  100+ students trained</text>
    <text x="272" y="91" font-family="Courier New,monospace" font-size="10" fill="#58a6ff">&#8594;  DSC BVCOE &#183; GAIL India</text>
  </g>
  <g class="t3">
    <text x="272" y="65" font-family="Courier New,monospace" font-size="10" fill="#d2a8ff">Loading EyeLink v2...</text>
    <text x="272" y="78" font-family="Courier New,monospace" font-size="10" fill="#7ee787">&#10003;  Accessibility layer OK</text>
    <text x="272" y="91" font-family="Courier New,monospace" font-size="10" fill="#58a6ff">&#8594;  Edge Runners: active</text>
  </g>

  <!-- Divider -->
  <line x1="265" y1="105" x2="474" y2="105" stroke="#30363d" stroke-width=".5"/>

  <!-- Skill bars -->
  <text x="272" y="118" class="lbl">STACK PROFICIENCY</text>

  <text x="272" y="132" class="lbl">Python  </text>
  <rect x="312" y="125" width="80" height="6" fill="#21262d" rx="3"/>
  <rect x="312" y="125" width="76" height="6" fill="#7ee787" rx="3" class="b1"/>

  <text x="272" y="146" class="lbl">ML / DL </text>
  <rect x="312" y="139" width="80" height="6" fill="#21262d" rx="3"/>
  <rect x="312" y="139" width="70" height="6" fill="#79c0ff" rx="3" class="b2"/>

  <text x="272" y="160" class="lbl">Web     </text>
  <rect x="312" y="153" width="80" height="6" fill="#21262d" rx="3"/>
  <rect x="312" y="153" width="62" height="6" fill="#d2a8ff" rx="3" class="b3"/>

  <text x="272" y="174" class="lbl">Systems </text>
  <rect x="312" y="167" width="80" height="6" fill="#21262d" rx="3"/>
  <rect x="312" y="167" width="55" height="6" fill="#ffa657" rx="3" class="b4"/>

  <!-- Footer -->
  <line x1="265" y1="184" x2="474" y2="184" stroke="#30363d" stroke-width=".5"/>
  <text x="272" y="196" class="lbl">$ </text>
  <rect x="283" y="187" width="7" height="10" rx="1" class="crs"/>
  <text x="472" y="196" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#21262d">[ open to 2026 ]</text>
</svg>
